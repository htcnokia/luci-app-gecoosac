name: Build Gecoosac APK for IPQ60xx (ZST Version)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev python3-setuptools python3-dev rsync unzip \
            zlib1g-dev swig wget file qdbus-qt5 zstd

      - name: Download ImmortalWrt SDK
        run: |
          # 动态匹配 zst 格式的 SDK
          BASE_URL="https://downloads.immortalwrt.org/snapshots/targets/qualcommax/ipq60xx/"
          SDK_FILENAME=$(wget -qO- $BASE_URL | grep -oE 'immortalwrt-sdk-[^">]+\.tar\.zst' | head -n 1)
          
          echo "Found SDK: $SDK_FILENAME"
          wget "${BASE_URL}${SDK_FILENAME}" -O sdk.tar.zst
          
          mkdir sdk
          zstd -d sdk.tar.zst -c | tar -xf - -C sdk --strip-components=1

      - name: Add Package & Configure
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          
          mkdir -p package/luci-app-gecoosac
          cp -r ../* package/luci-app-gecoosac/

          # 强制开启 APK 模式
          cat > .config <<EOF
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq60xx=y
          CONFIG_PACKAGE_luci-app-gecoosac=m
          CONFIG_USE_APK=y
          EOF
          
          make defconfig

      - name: Compile
        run: |
          cd sdk
          make package/luci-app-gecoosac/compile -j$(nproc) V=s

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-gecoosac-apk
          path: sdk/bin/packages/**/luci-app-gecoosac*.apk
