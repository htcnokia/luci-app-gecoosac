name: Build Gecoosac APK for IPQ60xx (SDK)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout luci-app-gecoosac
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev python3-distutils rsync unzip \
            zlib1g-dev swig wget file

      - name: Download ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/snapshots/targets/qualcommax/ipq60xx/immortalwrt-sdk-qualcommax-ipq60xx_gcc-13.3.0_musl.Linux-x86_64.tar.xz"
          wget $SDK_URL -O sdk.tar.xz
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

      - name: Add Package & Configure
        run: |
          cd sdk

          # ✅ 只更新一次 feeds（SDK 必要）
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base

          # ✅ 正确放入 package
          git clone https://github.com/laipeng668/luci-app-gecoosac package/luci-app-gecoosac

          # ✅ 正确生成 config（顺序很重要）
          cat > .config <<EOF
CONFIG_TARGET_qualcommax=y
CONFIG_TARGET_qualcommax_ipq60xx=y
CONFIG_PACKAGE_luci-app-gecoosac=m

# 🔥 启用 APK
CONFIG_PACKAGE_MANAGER_APK=y
EOF

          make defconfig

      - name: Compile (only package)
        run: |
          cd sdk
          make package/luci-app-gecoosac/compile -j$(nproc) V=s

      - name: Debug Output
        run: |
          find sdk/bin/ -name "*gecoosac*"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-gecoosac-apk
          path: sdk/bin/packages/**/*gecoosac*.apk
