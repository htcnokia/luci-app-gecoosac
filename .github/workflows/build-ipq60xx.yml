name: Build Gecoosac APK for IPQ60xx (Final Fix)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # 针对 Ubuntu 24.04 优化的依赖包
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev python3-setuptools python3-dev rsync unzip \
            zlib1g-dev swig wget file qdbus-qt5 zstd

      - name: Download ImmortalWrt SDK
        run: |
          # 动态获取最新的 .tar.zst 格式 SDK
          BASE_URL="https://downloads.immortalwrt.org/snapshots/targets/qualcommax/ipq60xx/"
          SDK_FILENAME=$(wget -qO- $BASE_URL | grep -oE 'immortalwrt-sdk-[^">]+\.tar\.zst' | head -n 1)
          
          if [ -z "$SDK_FILENAME" ]; then
            echo "Error: Cannot find SDK on $BASE_URL"
            exit 1
          fi
          
          echo "Found SDK: $SDK_FILENAME"
          wget "${BASE_URL}${SDK_FILENAME}" -O sdk.tar.zst
          
          # 解压 zst 格式
          mkdir sdk
          zstd -d sdk.tar.zst -c | tar -xf - -C sdk --strip-components=1

      - name: Add Package & Configure
        run: |
          cd sdk
          
          # 更新并安装基础 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          
          # 准备插件目录并排除 sdk 目录本身，防止递归拷贝报错
          mkdir -p package/luci-app-gecoosac
          rsync -av --exclude='sdk' ../* package/luci-app-gecoosac/

          # 写入配置：强制启用 APK 模式并选择该包
          cat > .config <<EOF
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq60xx=y
          CONFIG_PACKAGE_luci-app-gecoosac=m
          CONFIG_USE_APK=y
          EOF
          
          make defconfig

      - name: Compile
        run: |
          cd sdk
          # 编译整个 package 目录，确保主程序 gecoosac 和界面包一起生成
          make package/luci-app-gecoosac/compile -j$(nproc) V=s

      - name: Debug Output
        run: |
          echo "Checking for generated APK files..."
          find sdk/bin/packages/ -name "*.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-gecoosac-apk-full
          # 捕获所有相关的 apk 文件
          path: |
            sdk/bin/packages/**/luci-app-gecoosac*.apk
            sdk/bin/packages/**/gecoosac*.apk
