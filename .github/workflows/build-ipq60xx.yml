name: Build luci-app-gecoosac (APK, minimal)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout ImmortalWrt
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: master

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache g++ gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-distutils \
            rsync unzip wget zlib1g-dev file

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Clone luci-app-gecoosac
        run: |
          git clone --depth=1 https://github.com/laipeng668/luci-app-gecoosac package/luci-app-gecoosac

      # 🔥 关键：先生成 config（避免 menuconfig）
      - name: Configure (APK minimal)
        run: |
          export TERM=xterm
          export FORCE_UNSAFE_CONFIGURE=1

          cat > .config <<EOF
CONFIG_TARGET_qualcommax=y
CONFIG_TARGET_qualcommax_ipq60xx=y

# 只编译这个包
CONFIG_PACKAGE_luci-app-gecoosac=m

# 🔥 启用 APK
CONFIG_PACKAGE_MANAGER_APK=y

# ❗ 不编译固件
CONFIG_TARGET_ROOTFS_INITRAMFS=n
CONFIG_TARGET_IMAGES=n
EOF

          make defconfig

      # 🔥 必须但最小化
      - name: Build tools & toolchain
        run: |
          make -j$(nproc) tools/install
          make -j$(nproc) toolchain/install

      # ✅ 只编译目标包
      - name: Compile luci-app-gecoosac only
        run: |
          make package/luci-app-gecoosac/compile -j$(nproc) V=s

      # 🔍 Debug（强烈建议保留）
      - name: Find output
        run: |
          find bin/ -name "*gecoosac*"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-gecoosac-apk
          path: bin/packages/**/*gecoosac*.apk
